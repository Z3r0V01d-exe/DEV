<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DENR</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/applicant.css">
</head>
<body>
    <!-- Header Navigation -->
    <nav id="mainNavbar" class="navbar navbar-expand-lg navbar-dark fixed-top gov-navbar">
        <div class="container">

            <!-- Logo + Agency Name -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <i class="bi bi-tree-fill fs-4"></i>
                <div class="d-flex flex-column lh-sm">
                    <span class="fw-bold">Republic of the Philippines</span>
                    <small class="agency-name">Department of Environment and Natural Resources</small>
                </div>
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#govNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="govNavbar">
                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">
                        <a class="nav-link active" href="#"><i class="bi bi-house-door"></i> Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link require-login" href="#"><i class="bi bi-file-earmark-text"></i> Application</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link require-login" href="#"><i class="bi bi-briefcase"></i> Vacancies</a>
                    </li>

                    <!-- User Dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center gap-1"
                        href="#"
                        role="button"
                        data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle fs-5"></i>
                            Account
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end shadow" id="userMenu">
                            <li>
                                <a class="dropdown-item" href="#">
                                    <i class="bi bi-person-gear"></i> Admin Panel
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="#">
                                    <i class="bi bi-box-arrow-in-right"></i> Login
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="#">
                                    <i class="bi bi-person-plus"></i> Register
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger" href="#">
                                    <i class="bi bi-box-arrow-right"></i> Logout
                                </a>
                            </li>
                        </ul>
                    </li>

                </ul>
            </div>
        </div>
    </nav>


</body>
</html>
