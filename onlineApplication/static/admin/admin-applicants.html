<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applicants - DENR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="applicants-page">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top gov-navbar">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <i class="bi bi-tree-fill fs-4"></i>
                <div class="d-flex flex-column lh-sm">
                    <span class="fw-bold">Republic of the Philippines</span>
                    <small>Department of Environment and Natural Resources</small>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="goAdminDashboard()">
                            <i class="bi bi-house-door"></i> Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="goManageVacancies()">
                            <i class="bi bi-briefcase"></i> Vacancies
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="goApplicants()">
                            <i class="bi bi-briefcase"></i> Applicants
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="goReports()">
                            <i class="bi bi-briefcase"></i> Reports
                        </a>
                    </li>

                    <!-- Account Dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center gap-1"
                        href="#"
                        role="button"
                        data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle fs-5"></i>
                            <span id="navUserName"></span>
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end shadow" id="userMenu">
                            <li>
                                <a class="dropdown-item" href="#" onclick="adminProfile()">
                                    <i class="bi bi-person-gear"></i> View Profile
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item text-danger" href="#" onclick="adminLogout()">
                                    <i class="bi bi-box-arrow-right"></i> Logout
                                </a>
                            </li>
                        </ul>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container mt-4 mb-5">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">Applicants</h1>
        </div>

        <!-- Search & Filter Section -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">

                <div class="row g-3">

                    <!-- Search -->
                    <div class="col-md-4">
                        <input 
                            type="text"
                            id="searchApplicant"
                            class="form-control"
                            placeholder="Search...">
                    </div>

                    <!-- Position Filter -->
                    <div class="col-md-3">
                        <select id="filterPosition" class="form-select">
                            <option value="">All Positions</option>
                        </select>
                    </div>

                    <!-- Office Filter -->
                    <div class="col-md-3">
                        <select id="filterOffice" class="form-select">
                            <option value="">All Offices</option>
                        </select>
                    </div>

                    <!-- Date Sort -->
                    <div class="col-md-2">
                        <select id="sortDate" class="form-select">
                            <option value="recent">Recent → Old</option>
                            <option value="old">Old → Recent</option>
                        </select>
                    </div>

                </div>

            </div>
        </div>


        <!-- Applicants Table -->
        <div class="card shadow-sm">
            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Last Name</th>
                                <th>First Name</th>
                                <th>Position Applied</th>
                                <th>Office</th>
                                <th>Date Applied</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>

                        <tbody id="applicantsTable">

                            <!-- Empty State -->
                            <tr>
                                <td colspan="7" class="text-center text-muted py-4">
                                    No applicants yet.
                                </td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>
        </div>

    </main>
    

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/admin/admin-vacancies.js"></script>
    <script src="../js/admin/admin-auth.js"></script>

</body>
</html>
